<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            padding: 16px;
            padding-bottom: 110px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 { font-size: 22px; font-weight: 700; }

        .header .subtitle {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .items-list { padding: 8px 16px; }

        .item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
            transition: opacity 0.2s;
        }

        .item:last-child { border-bottom: none; }

        .item.checked { opacity: 0.45; }

        .item.checked .item-name-input { text-decoration: line-through; color: #9ca3af; }

        .check-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            background: white;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.15s;
        }

        .check-btn.checked {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }

        .item-name-input {
            flex: 1;
            padding: 7px 10px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            color: #1f2937;
            min-width: 0;
        }

        .item-name-input:focus { outline: none; border-color: #2563eb; }

        .qty-input {
            width: 52px;
            padding: 7px 6px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        .qty-input:focus { outline: none; border-color: #2563eb; }

        .price-input {
            width: 88px;
            padding: 7px 10px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            text-align: right;
        }

        .price-input:focus { outline: none; border-color: #2563eb; }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
            line-height: 1;
        }

        .column-labels {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px 0;
            font-size: 11px;
            color: #9ca3af;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .col-check { width: 28px; flex-shrink: 0; }
        .col-name { flex: 1; }
        .col-qty { width: 52px; text-align: center; }
        .col-price { width: 88px; text-align: right; }
        .col-del { width: 26px; }

        .add-item-section {
            padding: 12px 16px 16px;
            border-top: 2px solid #f0f4f8;
        }

        .add-item-btn {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .add-item-btn:active { background: #059669; }

        .clear-btn {
            width: 100%;
            background: none;
            color: #ef4444;
            border: 1.5px solid #fecaca;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }

        .total-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1f2937;
            color: white;
            padding: 16px 20px;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
        }

        .total-content { max-width: 600px; margin: 0 auto; }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .total-row:last-child { margin-bottom: 0; }

        .total-label { font-size: 16px; font-weight: 600; }
        .total-amount { font-size: 22px; font-weight: 700; color: #10b981; }
        .split-label { font-size: 13px; color: #9ca3af; }
        .split-amount { font-size: 18px; font-weight: 600; color: #60a5fa; }

        .item-count {
            font-size: 11px;
            color: #6b7280;
            text-align: center;
            padding: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Shopping List</h1>
            <div class="subtitle">Pay Just Now split calculator</div>
        </div>

        <div class="column-labels">
            <div class="col-check"></div>
            <div class="col-name">Item</div>
            <div class="col-qty">Qty</div>
            <div class="col-price">Price (R)</div>
            <div class="col-del"></div>
        </div>

        <div class="items-list" id="itemsList"></div>
        <div class="item-count" id="itemCount"></div>

        <div class="add-item-section">
            <button class="add-item-btn" onclick="addNewItem()">+ Add Item</button>
            <button class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>
    </div>

    <div class="total-bar">
        <div class="total-content">
            <div class="total-row">
                <span class="total-label">Total:</span>
                <span class="total-amount">R <span id="totalAmount">0.00</span></span>
            </div>
            <div class="total-row">
                <span class="split-label">Pay Just Now (3 splits):</span>
                <span class="split-amount">R <span id="splitAmount">0.00</span> each</span>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'shopping-list-v2';

        let items = loadItems();

        function loadItems() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            return [];
        }

        function saveItems() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
            } catch(e) {}
        }

        function renderItems() {
            const itemsList = document.getElementById('itemsList');
            itemsList.innerHTML = '';

            items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item' + (item.checked ? ' checked' : '');

                const checkBtn = document.createElement('button');
                checkBtn.className = 'check-btn' + (item.checked ? ' checked' : '');
                checkBtn.textContent = item.checked ? '✓' : '';
                checkBtn.onclick = () => toggleCheck(index);

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'item-name-input';
                nameInput.value = item.name;
                nameInput.placeholder = 'Item name';
                nameInput.addEventListener('input', (e) => {
                    items[index].name = e.target.value;
                    saveItems();
                });

                const qtyInput = document.createElement('input');
                qtyInput.type = 'number';
                qtyInput.className = 'qty-input';
                qtyInput.value = item.qty || 1;
                qtyInput.min = '1';
                qtyInput.placeholder = '1';
                qtyInput.addEventListener('input', (e) => {
                    items[index].qty = parseInt(e.target.value) || 1;
                    saveItems();
                    calculateTotal();
                });

                const priceInput = document.createElement('input');
                priceInput.type = 'number';
                priceInput.step = '0.01';
                priceInput.className = 'price-input';
                priceInput.value = item.price || '';
                priceInput.placeholder = '0.00';
                priceInput.addEventListener('input', (e) => {
                    items[index].price = parseFloat(e.target.value) || 0;
                    saveItems();
                    calculateTotal();
                });

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '×';
                deleteBtn.onclick = () => deleteItem(index);

                itemDiv.appendChild(checkBtn);
                itemDiv.appendChild(nameInput);
                itemDiv.appendChild(qtyInput);
                itemDiv.appendChild(priceInput);
                itemDiv.appendChild(deleteBtn);
                itemsList.appendChild(itemDiv);
            });

            const checked = items.filter(i => i.checked).length;
            document.getElementById('itemCount').textContent =
                items.length === 0 ? 'No items yet. Add something above.' :
                `${checked} of ${items.length} items checked off`;

            calculateTotal();
        }

        function toggleCheck(index) {
            items[index].checked = !items[index].checked;
            saveItems();
            renderItems();
        }

        function deleteItem(index) {
            items.splice(index, 1);
            saveItems();
            renderItems();
        }

        function addNewItem() {
            items.push({ name: '', qty: 1, price: 0, checked: false });
            saveItems();
            renderItems();
            const inputs = document.querySelectorAll('.item-name-input');
            if (inputs.length) inputs[inputs.length - 1].focus();
        }

        function clearAll() {
            if (confirm('Clear everything and start fresh?')) {
                items = [];
                saveItems();
                renderItems();
            }
        }

        function calculateTotal() {
            let total = 0;
            items.forEach(item => {
                const price = parseFloat(item.price) || 0;
                const qty = parseInt(item.qty) || 1;
                total += price * qty;
            });
            document.getElementById('totalAmount').textContent = total.toFixed(2);
            document.getElementById('splitAmount').textContent = (total / 3).toFixed(2);
        }

        renderItems();
    </script>
</body>
</html>
